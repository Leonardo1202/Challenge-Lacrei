name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:   ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}   # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO:     ${{ vars.ECR_REPO }}        # e.g. lacrei-status-api

permissions:
  id-token: write   # Required for OIDC → no long-lived AWS keys
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. BUILD & TEST ──────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="sha-${SHA_SHORT}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "📦 Image tag: ${TAG}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (includes test stage)
        uses: docker/build-push-action@v5
        with:
          context:    .
          target:     test          # Runs tests inside Docker build — fail fast
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          push:       false

      - name: Build & push runtime image
        uses: docker/build-push-action@v5
        with:
          context:    .
          target:     runtime
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}

      - name: Validate container health
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}"
          echo "▶ Starting container smoke test…"
          docker run -d --name smoke \
            -e NODE_ENV=production \
            -e APP_VERSION=${{ steps.meta.outputs.image_tag }} \
            -p 3000:3000 "$IMAGE"

          # Wait for healthcheck to pass (max 30s)
          for i in $(seq 1 10); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' smoke 2>/dev/null || echo "starting")
            echo "  attempt $i/10 — status: $STATUS"
            [[ "$STATUS" == "healthy" ]] && break
            sleep 3
          done

          RESPONSE=$(curl -sf http://localhost:3000/status)
          echo "✅ /status response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

          docker stop smoke && docker rm smoke

  # ── 2. DEPLOY STAGING ────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url:  ${{ vars.STAGING_URL }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Deploy to Staging EC2 via SSM
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}"
          echo "🚀 Deploying $IMAGE to STAGING"

          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID_STAGING }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}',
              'docker pull $IMAGE',
              'docker stop lacrei-app || true',
              'docker rm   lacrei-app || true',
              'docker run -d --name lacrei-app --restart unless-stopped -p 3000:3000 -e NODE_ENV=staging -e APP_VERSION=${{ needs.build.outputs.image_tag }} $IMAGE',
              'docker image prune -f'
            ]" \
            --comment "Deploy ${{ needs.build.outputs.image_tag }} to staging" \
            --output text \
            --query "Command.CommandId" > /tmp/cmd_id.txt

          CMD_ID=$(cat /tmp/cmd_id.txt)
          echo "SSM Command ID: $CMD_ID"

          # Poll until command completes
          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID_STAGING }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  attempt $i/20 — $STATUS"
            [[ "$STATUS" == "Success" ]] && break
            [[ "$STATUS" == "Failed"  ]] && echo "❌ SSM command failed" && exit 1
            sleep 6
          done

      - name: Smoke test staging
        run: |
          sleep 5
          RESPONSE=$(curl -sf "${{ vars.STAGING_URL }}/status")
          echo "✅ Staging /status: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

  # ── 3. DEPLOY PRODUCTION ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    environment:
      name: production
      url:  ${{ vars.PROD_URL }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Tag image as stable
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-ids imageTag=${{ needs.build.outputs.image_tag }} \
            --query 'images[0].imageManifest' --output text)

          aws ecr put-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-tag stable \
            --image-manifest "$MANIFEST"

      - name: Deploy to Production EC2 via SSM
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}"
          echo "🚀 Deploying $IMAGE to PRODUCTION"

          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID_PROD }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}',
              'docker pull $IMAGE',
              'docker stop lacrei-app || true',
              'docker rm   lacrei-app || true',
              'docker run -d --name lacrei-app --restart unless-stopped -p 3000:3000 -e NODE_ENV=production -e APP_VERSION=${{ needs.build.outputs.image_tag }} $IMAGE',
              'docker image prune -f'
            ]" \
            --comment "Deploy ${{ needs.build.outputs.image_tag }} to production" \
            --output text \
            --query "Command.CommandId" > /tmp/cmd_id.txt

          CMD_ID=$(cat /tmp/cmd_id.txt)

          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID_PROD }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  attempt $i/20 — $STATUS"
            [[ "$STATUS" == "Success" ]] && break
            [[ "$STATUS" == "Failed"  ]] && echo "❌ SSM command failed" && exit 1
            sleep 6
          done

      - name: Smoke test production
        run: |
          sleep 5
          RESPONSE=$(curl -sf "${{ vars.PROD_URL }}/status")
          echo "✅ Production /status: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

  # ── 4. NOTIFY on failure ─────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [build, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send SNS alert
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_ALERT_TOPIC_ARN }}" \
            --subject "❌ Deploy FAILED — ${{ github.ref_name }}" \
            --message "Pipeline failed for commit ${{ github.sha }} on ${{ github.ref }}. Actor: ${{ github.actor }}. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          AWS_REGION:            ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

#concurrency:
#  group: deploy-${{ github.ref }}
#  cancel-in-progress: false

env:
  AWS_REGION:   ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPO:     ${{ vars.ECR_REPO }}

permissions:
  id-token: write
  contents: read

jobs:

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Image tag: sha-${SHA_SHORT}"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push runtime image
        uses: docker/build-push-action@v5
        with:
          context:    .
          target:     runtime
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
      - name: Validate container health
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}"
          docker run -d --name smoke -e NODE_ENV=test -p 3000:3000 "$IMAGE"
          sleep 5
          RESPONSE=$(curl -sf http://localhost:3000/status)
          echo "✅ /status: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'
          docker stop smoke && docker rm smoke

  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url:  ${{ vars.STAGING_URL }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
      - name: Deploy to Staging via SSM
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID_STAGING }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'if ! command -v aws &>/dev/null; then curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip && unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install; fi',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}',
              'docker pull $IMAGE',
              'docker stop lacrei-app || true',
              'docker rm lacrei-app || true',
              'docker run -d --name lacrei-app --restart unless-stopped -p 3000:3000 -e NODE_ENV=staging -e APP_VERSION=${{ needs.build.outputs.image_tag }} $IMAGE',
              'docker image prune -f'
            ]" \
            --output text --query "Command.CommandId")
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID_STAGING }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  attempt $i/30 - $STATUS"
            [[ "$STATUS" == "Success" ]] && break
            [[ "$STATUS" == "Failed"  ]] && exit 1
            sleep 10
          done
      - name: Smoke test staging
        run: |
          sleep 10
          RESPONSE=$(curl -sf "${{ vars.STAGING_URL }}/status")
          echo "$RESPONSE" | grep -q '"status":"ok"'

  deploy-production:
    name: Deploy → Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url:  ${{ vars.PROD_URL }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
      - name: Tag image as stable
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-ids imageTag=${{ needs.build.outputs.image_tag }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-tag stable \
            --image-manifest "$MANIFEST"
      - name: Deploy to Production via SSM
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.build.outputs.image_tag }}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID_PROD }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'if ! command -v aws &>/dev/null; then curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip && unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install; fi',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}',
              'docker pull $IMAGE',
              'docker stop lacrei-app || true',
              'docker rm lacrei-app || true',
              'docker run -d --name lacrei-app --restart unless-stopped -p 3000:3000 -e NODE_ENV=production -e APP_VERSION=${{ needs.build.outputs.image_tag }} $IMAGE',
              'docker image prune -f'
            ]" \
            --output text --query "Command.CommandId")
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID_PROD }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  attempt $i/30 - $STATUS"
            [[ "$STATUS" == "Success" ]] && break
            [[ "$STATUS" == "Failed"  ]] && exit 1
            sleep 10
          done
      - name: Smoke test production
        run: |
          sleep 10
          RESPONSE=$(curl -sf "${{ vars.PROD_URL }}/status")
          echo "$RESPONSE" | grep -q '"status":"ok"'

  notify-failure:
    name: Notify on failure
    needs: [build, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}
      - name: Send SNS alert
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_ALERT_TOPIC_ARN }}" \
            --subject "Deploy FAILED - ${{ github.ref_name }}" \
            --message "Pipeline failed for commit ${{ github.sha }}. Actor: ${{ github.actor }}. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --region ${{ vars.AWS_REGION }}


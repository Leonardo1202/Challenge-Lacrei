# nginx/api.cloudfy.solutions.conf
# Ambiente: PRODUCTION
# Domínio:  api.cloudfy.solutions

server {
    listen 80;
    server_name api.cloudfy.solutions;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Redireciona tudo para HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.cloudfy.solutions;

    # TLS — preenchido pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/api.cloudfy.solutions/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cloudfy.solutions/privkey.pem;

    # Mozilla Modern TLS
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;

    # Produção NÃO expõe header de ambiente
    # add_header X-Environment "production" always;  # removido intencionalmente

    # Rate limiting — proteção extra em produção
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req zone=api_limit burst=10 nodelay;

    # Proxy → container Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
        # Health check sem rate limit
        limit_req off;
    }
}